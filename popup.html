<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="shell">
    <header class="header">
      <div>
        <div class="eyebrow">Browser extension</div>
        <h1>Tab Organizer</h1>
        <p class="subtitle">Zoskupuje taby podla domén a vlastných kategórií.</p>
      </div>
      <label class="switch" aria-label="Zapnutie rozšírenia">
        <input type="checkbox" id="enabledToggle">
        <span class="switch-track"></span>
      </label>
    </header>

    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>Kategórie</h2>
          <p>Pomenuj skupiny, nastav farby a pridaj vlastne domény.</p>
        </div>
        <button id="addCategoryBtn" type="button" class="ghost-btn">Pridat kategóriu</button>
      </div>
      <div id="categories" class="categories"></div>
    </section>

    <section class="panel actions-panel">
      <button class="primary-btn" id="organizeBtn" type="button">Preusporiadat teraz</button>
      <div class="status" id="status">Nacitavam nastavenia...</div>
      <p class="hint">Nastavenia sa ukladaju automaticky.</p>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
